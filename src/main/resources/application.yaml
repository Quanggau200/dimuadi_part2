spring:
  application:
    name:dimuadi
  config:
    import:
      - classpath:application-db.yaml
      - classpath:application-jwt.yaml
  jpa:
    show-sql:true
  server:
    port: 8080
    address: 0.0.0.0
    servlet:
      multipart:
        max-file-size: 10MB
        max-request-size: 10MB
logging:
  level:
    org:
      hibernate:
        SQL: debug
        type:
          descriptor:
            sql: trace
